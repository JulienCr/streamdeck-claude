<svg xmlns="http://www.w3.org/2000/svg" width="144" height="144" viewBox="0 0 144 144">
  <!-- Marketplace card: rounded border + three accent dots + label.
       Palette: bg #0f1115, accent #f97316 (Claude orange), text #e5e7eb. -->
  <rect width="144" height="144" fill="#0f1115"/>
  <rect x="12" y="12" width="120" height="120" rx="10" ry="10"
        fill="none" stroke="#f97316" stroke-width="4"/>
  <!-- Three dots, slightly above the vertical centre to leave room for the label -->
  <g fill="#f97316">
    <circle cx="54" cy="60" r="5.6"/>
    <circle cx="72" cy="60" r="6.5"/>
    <circle cx="90" cy="60" r="5.6"/>
  </g>
  <text x="72" y="116" text-anchor="middle"
        font-family="-apple-system,Segoe UI,Roboto,DejaVu Sans,Arial,sans-serif"
        font-weight="700" font-size="11" fill="#e5e7eb">Claude Sessions</text>
</svg>
