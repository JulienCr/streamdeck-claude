<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">
  <!-- Action picker icon: three slider rails with offset knobs (settings glyph). -->
  <rect width="40" height="40" fill="#0f1115"/>
  <g stroke="#f97316" stroke-width="2" stroke-linecap="round" fill="none">
    <line x1="8" y1="13" x2="32" y2="13"/>
    <line x1="8" y1="20" x2="32" y2="20"/>
    <line x1="8" y1="27" x2="32" y2="27"/>
  </g>
  <g fill="#0f1115" stroke="#f97316" stroke-width="2">
    <circle cx="15" cy="13" r="3"/>
    <circle cx="25" cy="20" r="3"/>
    <circle cx="19" cy="27" r="3"/>
  </g>
</svg>
