<svg xmlns="http://www.w3.org/2000/svg" width="144" height="144" viewBox="0 0 144 144">
  <!-- Default Setup key: dark bg, subtle outer rounded border, large sliders glyph,
       small SETUP label below. -->
  <rect width="144" height="144" fill="#0f1115"/>
  <rect x="2" y="2" width="140" height="140" rx="14" ry="14"
        fill="none" stroke="#374151" stroke-opacity="0.78" stroke-width="2"/>
  <g transform="translate(72,62)" stroke="#f97316" stroke-width="5" stroke-linecap="round" fill="none">
    <line x1="-44" y1="-26" x2="44" y2="-26"/>
    <line x1="-44" y1="0"   x2="44" y2="0"/>
    <line x1="-44" y1="26"  x2="44" y2="26"/>
  </g>
  <g transform="translate(72,62)" fill="#0f1115" stroke="#f97316" stroke-width="5">
    <circle cx="-14" cy="-26" r="8"/>
    <circle cx="20"  cy="0"   r="8"/>
    <circle cx="-2"  cy="26"  r="8"/>
  </g>
  <text x="72" y="124" text-anchor="middle"
        font-family="-apple-system, 'Segoe UI', system-ui, sans-serif"
        font-size="14" font-weight="700" letter-spacing="0.18em"
        fill="#9ca3af">SETUP</text>
</svg>
